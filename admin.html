<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0518">
<title>Rescue TCG — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#0D0518;color:#F0E6C8;min-height:100vh;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;background:radial-gradient(ellipse at 50% 100%,#2D0A50 0%,#1A0A2E 40%,#0D0518 100%);}
.login-box{width:100%;max-width:320px;background:linear-gradient(175deg,#1E0A38,#120720);border:1px solid rgba(232,24,122,0.3);border-radius:18px;padding:32px 22px;box-shadow:0 0 60px rgba(232,24,122,0.15);}
.login-logo-text{font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fff,#F0C040,#FF2D9A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.login-sub{font-size:11px;color:#9D7DB8;letter-spacing:3px;text-align:center;margin-bottom:22px;text-transform:uppercase;}
.login-error{color:#F87171;font-size:11px;text-align:center;margin-bottom:10px;min-height:16px;font-family:'Cinzel',serif;}
.login-input{width:100%;background:rgba(61,20,102,0.4);border:1px solid #4A1575;border-radius:8px;padding:12px 14px;color:#F0E6C8;font-family:'Cinzel',serif;font-size:14px;outline:none;margin-bottom:12px;-webkit-appearance:none;transition:border-color 0.15s;}
.login-input:focus{border-color:#E8187A;}
.login-btn{width:100%;background:linear-gradient(135deg,#E8187A,#9D0050);border:none;border-radius:8px;padding:13px;color:white;font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 0 #500025;}
.dashboard{display:none;}
.topbar{background:linear-gradient(135deg,#1E0A38,#120720);border-bottom:1px solid rgba(232,24,122,0.2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:900;color:#E8187A;letter-spacing:3px;}
.topbar-right{display:flex;gap:8px;}
.refresh-btn,.logout-btn{font-family:'Cinzel',serif;font-size:10px;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;letter-spacing:1px;border:1px solid;transition:all 0.15s;}
.refresh-btn{border-color:rgba(212,160,23,0.5);background:rgba(212,160,23,0.08);color:#D4A017;}
.logout-btn{border-color:rgba(232,24,122,0.4);background:rgba(232,24,122,0.08);color:#F472B6;}
.tabs{display:flex;border-bottom:1px solid #4A1575;background:#0D0518;position:sticky;top:48px;z-index:49;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:10px 16px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9D7DB8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:#E8187A;border-bottom-color:#E8187A;}
.content{padding:16px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:linear-gradient(175deg,#1E0A38,#120720);border:1px solid #4A1575;border-radius:12px;padding:16px 12px;text-align:center;}
.stat-number{font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:#E8187A;display:block;}
.stat-label{font-size:10px;color:#9D7DB8;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.sec-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:2px;color:#D4A017;margin-bottom:12px;text-transform:uppercase;}
.list{display:flex;flex-direction:column;gap:8px;}
.list-item{background:linear-gradient(135deg,#1E0A38,#120720);border:1px solid #4A1575;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.list-item-icon{font-size:22px;flex-shrink:0;}
.list-item-info{flex:1;min-width:0;}
.list-item-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#F0E6C8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-item-sub{font-size:11px;color:#9D7DB8;margin-top:2px;}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:1px;}
.badge-green{background:rgba(74,222,128,0.12);color:#4ADE80;border:1px solid #4ADE80;}
.badge-gold{background:rgba(212,160,23,0.12);color:#D4A017;border:1px solid #D4A017;}
.badge-manual{background:rgba(129,140,248,0.12);color:#818CF8;border:1px solid #818CF8;}
.action-btn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;padding:5px 10px;border-radius:5px;cursor:pointer;letter-spacing:1px;border:1px solid rgba(232,24,122,0.5);background:rgba(232,24,122,0.1);color:#F472B6;white-space:nowrap;flex-shrink:0;}
.code-tag{font-size:11px;font-family:monospace;background:rgba(74,222,128,0.1);padding:2px 8px;border-radius:4px;color:#4ADE80;border:1px dashed rgba(74,222,128,0.4);display:inline-block;margin-top:4px;}
.empty{text-align:center;padding:32px 20px;color:#4A1575;font-style:italic;font-size:13px;}
.loading{text-align:center;padding:30px;color:#4A1575;font-style:italic;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,2,15,0.92);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.visible{display:flex;}
.modal-box{background:linear-gradient(175deg,#1E0A38,#120720);border:1px solid rgba(232,24,122,0.3);border-radius:14px;padding:24px 20px;width:100%;max-width:300px;}
.modal-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:2px;color:#F0E6C8;text-align:center;margin-bottom:6px;}
.modal-sub{font-size:11px;color:#9D7DB8;text-align:center;margin-bottom:16px;}
.modal-input{width:100%;background:rgba(61,20,102,0.4);border:1px solid #4A1575;border-radius:8px;padding:11px 14px;color:#F0E6C8;font-family:'Cinzel',serif;font-size:16px;outline:none;margin-bottom:12px;-webkit-appearance:none;text-align:center;}
.modal-btns{display:flex;gap:8px;}
.modal-confirm{flex:1;background:linear-gradient(135deg,#E8187A,#9D0050);border:none;border-radius:8px;padding:12px;color:white;font-family:'Cinzel',serif;font-size:13px;font-weight:700;cursor:pointer;}
.modal-cancel{flex:1;background:transparent;border:1px solid #4A1575;border-radius:8px;padding:12px;color:#9D7DB8;font-family:'Cinzel',serif;font-size:13px;cursor:pointer;}
.search-box{width:100%;background:rgba(61,20,102,0.4);border:1px solid #4A1575;border-radius:8px;padding:10px 14px;color:#F0E6C8;font-family:Georgia,serif;font-size:13px;outline:none;margin-bottom:14px;}
.search-box:focus{border-color:#E8187A;}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo-text">RESCUE TCG</div>
    <div class="login-sub">Panel Admin</div>
    <div class="login-error" id="login-error"></div>
    <input class="login-input" type="password" id="admin-pass" placeholder="Contraseña de admin" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-title">ADMIN</div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadTab(activeTab)">Actualizar</button>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-stats"       onclick="loadTab('stats')">Stats</div>
    <div class="tab"        id="tab-users"       onclick="loadTab('users')">Usuarios</div>
    <div class="tab"        id="tab-payments"    onclick="loadTab('payments')">Pagos</div>
    <div class="tab"        id="tab-prizes"      onclick="loadTab('prizes')">Premios</div>
    <div class="tab"        id="tab-redemptions" onclick="loadTab('redemptions')">🎴 Canjes</div>
  </div>
  <div class="content" id="tab-content"><div class="loading">Cargando...</div></div>
</div>

<div class="modal-overlay" id="gems-modal">
  <div class="modal-box">
    <div class="modal-title">Agregar Maná</div>
    <div class="modal-sub" id="modal-sub"></div>
    <input class="modal-input" type="number" id="modal-amount" placeholder="0" min="1">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" id="modal-confirm-btn" onclick="confirmGems()">Agregar</button>
    </div>
  </div>
</div>

<script>
var BACKEND   = 'https://rescue-gacha-backend.vercel.app';
var activeTab = 'stats';
var adminToken = null;
var modalUserId = null;
var modalCurrentGems = 0;
var modalEmail = '';

// ── Auth ──────────────────────────────────────────────────────
function getToken() { return adminToken || sessionStorage.getItem('rg_admin_token'); }
function setToken(t){ adminToken = t; sessionStorage.setItem('rg_admin_token', t); }
function clearToken(){ adminToken = null; sessionStorage.removeItem('rg_admin_token'); }

async function doLogin() {
  var pass = document.getElementById('admin-pass').value;
  var btn  = document.getElementById('login-btn');
  var err  = document.getElementById('login-error');
  if (!pass) { err.textContent = 'Ingresa la contraseña'; return; }
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    var res  = await adminFetch('login', { password: pass }, false);
    if (res.ok) {
      setToken(res.token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadTab('stats');
    } else {
      err.textContent = res.error || 'Contraseña incorrecta';
    }
  } catch(e) {
    err.textContent = 'Sin conexión al servidor';
  }
  btn.disabled = false; btn.textContent = 'ENTRAR';
}

document.getElementById('admin-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogout() { clearToken(); location.reload(); }

// ── Fetch admin ───────────────────────────────────────────────
async function adminFetch(action, body, requireAuth) {
  requireAuth = requireAuth !== false;
  var headers = { 'Content-Type': 'application/json' };
  if (requireAuth) headers['Authorization'] = 'Bearer ' + getToken();
  var res = await fetch(BACKEND + '/api/admin', {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(Object.assign({ action: action }, body || {}))
  });
  return res.json();
}

// ── Tabs ──────────────────────────────────────────────────────
function loadTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  document.getElementById('tab-content').innerHTML = '<div class="loading">Cargando...</div>';
  if (tab === 'stats')       loadStats();
  if (tab === 'users')       loadUsers();
  if (tab === 'payments')    loadPayments();
  if (tab === 'prizes')      loadPrizes();
  if (tab === 'redemptions') loadRedemptions();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-MX', {day:'2-digit',month:'2-digit',year:'2-digit'});
}
function fmtTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
}

// ── Stats ─────────────────────────────────────────────────────
async function loadStats() {
  var d = await adminFetch('stats');
  if (!d.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">Error al cargar</div>'; return; }
  document.getElementById('tab-content').innerHTML =
    '<div class="stats-grid">' +
    '<div class="stat-card"><span class="stat-number">' + d.users + '</span><span class="stat-label">Usuarios</span></div>' +
    '<div class="stat-card"><span class="stat-number">' + d.payments + '</span><span class="stat-label">Pagos</span></div>' +
    '<div class="stat-card"><span class="stat-number">$' + d.revenue + '</span><span class="stat-label">Ingresos MXN</span></div>' +
    '<div class="stat-card"><span class="stat-number">' + d.activePrizes + '</span><span class="stat-label">Premios activos</span></div>' +
    '</div>';
}

// ── Usuarios ──────────────────────────────────────────────────
async function loadUsers() {
  var d = await adminFetch('users');
  if (!d.ok || !d.users) { document.getElementById('tab-content').innerHTML = '<div class="empty">Sin usuarios</div>'; return; }
  var html = '<input class="search-box" id="user-search" placeholder="Buscar por usuario o correo..." oninput="filterUsers()" autocomplete="off">';
  html += '<p class="sec-title">Usuarios (' + d.users.length + ')</p><div class="list" id="users-list">';
  d.users.forEach(function(u) {
    var name = u.username || u.email;
    html += '<div class="list-item" data-search="' + (name + ' ' + u.email).toLowerCase() + '">';
    html += '<div class="list-item-icon">&#128100;</div>';
    html += '<div class="list-item-info">';
    html += '<div class="list-item-title">' + name + '</div>';
    html += '<div class="list-item-sub">' + u.email + ' &nbsp;|&nbsp; <span class="badge badge-gold">&#10022; ' + (u.gems||0) + ' Maná</span></div>';
    html += '</div>';
    html += '<button class="action-btn" onclick="openModal(\'' + u.id + '\',\'' + (u.username||u.email) + '\',' + (u.gems||0) + ')">+ Maná</button>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('tab-content').innerHTML = html;
}

function filterUsers() {
  var q = document.getElementById('user-search').value.toLowerCase();
  document.querySelectorAll('#users-list .list-item').forEach(function(el) {
    el.style.display = el.dataset.search.includes(q) ? '' : 'none';
  });
}

// ── Modal Maná ────────────────────────────────────────────────
function openModal(userId, name, currentGems) {
  modalUserId = userId;
  modalCurrentGems = currentGems;
  document.getElementById('modal-sub').textContent = name + ' — Maná actual: ' + currentGems;
  document.getElementById('modal-amount').value = '';
  document.getElementById('gems-modal').classList.add('visible');
  setTimeout(function(){ document.getElementById('modal-amount').focus(); }, 100);
}

function closeModal() {
  document.getElementById('gems-modal').classList.remove('visible');
  modalUserId = null;
}

async function confirmGems() {
  var amount = parseInt(document.getElementById('modal-amount').value);
  if (!amount || amount <= 0) { alert('Ingresa una cantidad válida'); return; }
  var btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true; btn.textContent = 'Agregando...';
  var d = await adminFetch('add_gems', { user_id: modalUserId, amount: amount });
  btn.disabled = false; btn.textContent = 'Agregar';
  if (d.ok) {
    closeModal();
    loadTab('users');
  } else {
    alert(d.error || 'Error al agregar Maná');
  }
}

document.getElementById('modal-amount').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmGems();
});

// ── Pagos ─────────────────────────────────────────────────────
async function loadPayments() {
  var d = await adminFetch('payments');
  if (!d.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">Sin pagos</div>'; return; }
  var payments = d.payments || [];
  if (!payments.length) { document.getElementById('tab-content').innerHTML = '<div class="empty">Sin pagos</div>'; return; }
  var html = '<p class="sec-title">Pagos (' + payments.length + ')</p><div class="list">';
  payments.forEach(function(p) {
    var name = (p.users && (p.users.username || p.users.email)) || '—';
    var isManual = p.status === 'manual';
    html += '<div class="list-item">';
    html += '<div class="list-item-icon">&#128179;</div>';
    html += '<div class="list-item-info">';
    html += '<div class="list-item-title">' + name + '</div>';
    html += '<div class="list-item-sub">$' + p.amount_mxn + ' MXN &nbsp;|&nbsp; <span class="badge badge-gold">&#10022; ' + p.gems_granted + '</span> &nbsp;|&nbsp; ' + fmtDate(p.created_at) + '</div>';
    html += '</div>';
    html += '<span class="badge ' + (isManual ? 'badge-manual' : 'badge-green') + '">' + (isManual ? 'Manual' : p.status) + '</span>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('tab-content').innerHTML = html;
}

// ── Premios ───────────────────────────────────────────────────
async function loadPrizes() {
  var d = await adminFetch('prizes');
  if (!d.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">Error</div>'; return; }
  var prizes = d.prizes || [];
  var active   = prizes.filter(function(p) { return !p.redeemed; });
  var redeemed = prizes.filter(function(p) { return  p.redeemed; });
  var html = '';
  if (active.length) {
    html += '<p class="sec-title">Pendientes (' + active.length + ')</p><div class="list">';
    active.forEach(function(p) {
      var name = (p.users && (p.users.username || p.users.email)) || '—';
      html += '<div class="list-item">';
      html += '<div class="list-item-icon">&#127873;</div>';
      html += '<div class="list-item-info">';
      html += '<div class="list-item-title">' + p.name + '</div>';
      html += '<div class="list-item-sub">' + name + '</div>';
      html += '<div class="code-tag">' + p.code + '</div>';
      html += '</div>';
      html += '<button class="action-btn" onclick="redeemPrize(\'' + p.id + '\',this)">Canjear</button>';
      html += '</div>';
    });
    html += '</div>';
  }
  if (redeemed.length) {
    html += '<p class="sec-title" style="margin-top:20px;">Canjeados (' + redeemed.length + ')</p><div class="list">';
    redeemed.forEach(function(p) {
      var name = (p.users && (p.users.username || p.users.email)) || '—';
      html += '<div class="list-item" style="opacity:0.45;">';
      html += '<div class="list-item-icon">&#9989;</div>';
      html += '<div class="list-item-info">';
      html += '<div class="list-item-title">' + p.name + '</div>';
      html += '<div class="list-item-sub">' + name + ' &middot; ' + fmtDate(p.created_at) + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }
  if (!prizes.length) html = '<div class="empty">Sin premios</div>';
  document.getElementById('tab-content').innerHTML = html;
}

async function redeemPrize(id, btn) {
  btn.textContent = '...'; btn.disabled = true;
  var d = await adminFetch('redeem_prize', { prize_id: id });
  if (d.ok) loadPrizes();
  else { btn.textContent = 'Canjear'; btn.disabled = false; alert(d.error || 'Error'); }
}

// ── Canjes de cartas ──────────────────────────────────────────
async function loadRedemptions() {
  var d = await adminFetch('redemptions');
  if (!d.ok) { document.getElementById('tab-content').innerHTML = '<div class="empty">Error</div>'; return; }
  var rows = d.redemptions || [];
  if (!rows.length) { document.getElementById('tab-content').innerHTML = '<div class="empty">Sin canjes aún</div>'; return; }
  var rarityColors = {common:'#AAAACC',rare:'#7AA4F0',epic:'#C084FC',legendary:'#D4A017',secret:'#E879F9'};
  var rarityLabels = {common:'Común',rare:'Rara',epic:'Épica',legendary:'Legendaria',secret:'Secreta'};
  var html = '<p class="sec-title">Canjes de cartas (' + rows.length + ')</p><div class="list">';
  rows.forEach(function(r) {
    var color = rarityColors[r.rarity] || '#F0E6C8';
    var label = rarityLabels[r.rarity] || r.rarity;
    html += '<div class="list-item">';
    html += '<div class="list-item-icon">🎴</div>';
    html += '<div class="list-item-info">';
    html += '<div class="list-item-title">' + (r.email || '—') + '</div>';
    html += '<div class="list-item-sub"><span style="color:' + color + ';font-weight:700;">' + label + '</span> · ' + fmtDate(r.redeemed_at) + ' ' + fmtTime(r.redeemed_at) + '</div>';
    html += '</div>';
    html += '<span class="badge badge-green">Canjeado</span>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('tab-content').innerHTML = html;
}

// ── Restore session ───────────────────────────────────────────
if (sessionStorage.getItem('rg_admin_token')) {
  adminToken = sessionStorage.getItem('rg_admin_token');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadTab('stats');
}
</script>
</body>
</html>
